# Configuração H2 em memória (para testes sem PostgreSQL)
spring.datasource.url=jdbc:h2:mem:xaxindb
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console (http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Porta do servidor
server.port=8080

# JWT
jwt.secret=${JWT_SECRET:please_set_jwt_secret}
jwt.expiration=172800000

# Uploads
app.upload.dir=uploads

# Multipart upload limits
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Flyway (DB migrations)
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Upload strategy: local or s3
app.upload.strategy=local
# When using S3, configure these env vars or properties
aws.s3.bucket=
aws.s3.region=
aws.s3.access-key=
aws.s3.secret-key=

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
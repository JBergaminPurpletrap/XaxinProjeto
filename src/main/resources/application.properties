# Configuração do banco de dados PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/sua_base
spring.datasource.username=seu_usuario
spring.datasource.password=sua_senha
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Porta do servidor
server.port=8080

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=172800000

# Uploads
app.upload.dir=uploads

# Multipart upload limits
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Flyway (DB migrations)
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Upload strategy: local or s3
app.upload.strategy=local
# When using S3, configure these env vars or properties
aws.s3.bucket=
aws.s3.region=
aws.s3.access-key=
aws.s3.secret-key=

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# CORS origins for frontend (comma-separated). Can be set via env FRONTEND_ORIGINS
app.cors.origins=${FRONTEND_ORIGINS:http://localhost:3000}

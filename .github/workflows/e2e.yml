name: E2E Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: 'maven'

      - name: Build (skip tests)
        run: mvn -B -DskipTests package

      - name: Start app (H2 profile) in background
        run: |
          mkdir -p target
          mvn -Dspring-boot.run.profiles=h2 -DskipTests spring-boot:run &
          echo $! > app.pid


      - name: Wait for health (with retries)
        run: |
          set -e
          echo "Waiting for /actuator/health..." > target/smoke-wait.log
          attempts=0
          max=60
          until curl -sSf http://localhost:8080/actuator/health > target/smoke-health.json 2>> target/smoke-wait.log; do
            attempts=$((attempts+1))
            echo "attempt $attempts failed" >> target/smoke-wait.log
            if [ $attempts -ge $max ]; then cat target/smoke-wait.log; exit 1; fi
            sleep 2
          done
          echo "healthy" >> target/smoke-wait.log

      - name: Smoke: register + login + progresso (capture outputs)
        run: |
          # register (ignore error if already exists)
          mkdir -p target
          curl -sS -X POST http://localhost:8080/api/users/cadastro -H 'Content-Type: application/json' -d '{"username":"smoketest","password":"123","nome":"Smoke"}' -o target/smoke-register.json || true
          # login and save response
          curl -sS -X POST http://localhost:8080/api/users/login -H 'Content-Type: application/json' -d '{"username":"smoketest","password":"123"}' -o target/smoke-login.json
          TOKEN=$(jq -r '.data.token // .token' target/smoke-login.json || true)
          echo "token=$TOKEN" > target/smoke-token.txt
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then cat target/smoke-login.json; echo "login failed"; exit 1; fi
          # progresso
          curl -sS -H "Authorization: Bearer $TOKEN" http://localhost:8080/api/qrcode/progresso -o target/smoke-progresso.json

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-logs
          path: |
            target/smoke-*.json
            target/smoke-*.log
            app.pid

      - name: Stop app
        if: always()
        run: |
          if [ -f app.pid ]; then kill $(cat app.pid) || true; fi

  smoke-windows:
    name: Smoke Tests (Windows)
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: 'maven'

      - name: Build (skip tests)
        run: mvn -B -DskipTests package
        shell: pwsh

      - name: Start app (H2) in background
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path target -Force | Out-Null
          $p = Start-Process -NoNewWindow -FilePath java -ArgumentList '-jar','target\xaxin-projeto-qrcode-1.0.0.jar','--spring.profiles.active=h2' -PassThru
          $p.Id | Out-File -FilePath app_pid.txt -Encoding ascii

      - name: Wait for health (Windows, retries)
        shell: pwsh
        run: |
          $out = 'target\smoke-wait-windows.log'
          New-Item -ItemType File -Force -Path $out | Out-Null
          $i=0; $max=60
          while ($i -lt $max) {
            try { Invoke-RestMethod -Uri 'http://localhost:8080/actuator/health' -TimeoutSec 2 | Out-File -Append $out; Write-Output 'ok'; exit 0 } catch { Start-Sleep -Seconds 2; $i++; Add-Content -Path $out -Value "attempt $i failed" }
          }
          Get-Content $out
          exit 1

      - name: Smoke: register + login + progresso (capture outputs)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path target -Force | Out-Null
          try { Invoke-RestMethod -Uri 'http://localhost:8080/api/users/cadastro' -Method Post -Body (@{username='smoketest';password='123';nome='Smoke'} | ConvertTo-Json) -ContentType 'application/json' -ErrorAction SilentlyContinue | ConvertTo-Json | Out-File target\smoke-register-windows.json } catch { }
          try { $login = Invoke-RestMethod -Uri 'http://localhost:8080/api/users/login' -Method Post -Body (@{username='smoketest';password='123'} | ConvertTo-Json) -ContentType 'application/json' -ErrorAction Stop; $login | ConvertTo-Json | Out-File target\smoke-login-windows.json } catch { Write-Error 'login failed'; Get-Content target\smoke-login-windows.json -ErrorAction SilentlyContinue; exit 1 }
          $token = $null; if ($login -and $login.token) { $token = $login.token }
          if (-not $token) { Write-Error 'no token'; exit 1 }
          Invoke-RestMethod -Uri 'http://localhost:8080/api/qrcode/progresso' -Headers @{ Authorization = "Bearer $token" } | ConvertTo-Json | Out-File target\smoke-progresso-windows.json

      - name: Upload smoke artifacts (Windows)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-logs-windows
          path: |
            target\smoke-*.json
            target\smoke-*.log
            app_pid.txt

      - name: Stop app (Windows)
        if: always()
        shell: pwsh
        run: |
          if (Test-Path app_pid.txt) { $pid = Get-Content app_pid.txt -Raw; Stop-Process -Id $pid -ErrorAction SilentlyContinue }

  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: 'maven'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Build (skip tests)
        run: mvn -B clean package -DskipTests

      - name: Run Flyway migrations
        run: mvn -B -DskipTests flyway:migrate || true

      - name: Make scripts executable
        run: chmod +x scripts/e2e-test.sh || true

      - name: Run E2E script
        # script starts the jar, runs the flow and writes target/e2e-report.md
        run: ./scripts/e2e-test.sh

      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          path: |
            target/e2e-report.md
            target/xaxin-projeto-qrcode-*.jar

  e2e-windows:
    name: E2E Tests (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: 'maven'

      - name: Build (skip tests)
        run: mvn -B clean package -DskipTests

      - name: Run Flyway migrations (Windows)
        shell: pwsh
        run: mvn -B -DskipTests flyway:migrate || true

      - name: Run E2E PowerShell
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File .\scripts\e2e-test.ps1 -NoStart

      - name: Upload E2E report (Windows)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report-windows
          path: |
            target/e2e-report.md
            target/xaxin-projeto-qrcode-*.jar
